version: 2
updates:
  # Tracks the `dependencies:` entry in each chart's Chart.yaml (argocd,
  # cert-manager, longhorn, metrics-server, traefik, proof-app/podinfo) and
  # opens a PR bumping `version:` when the upstream chart repo publishes a
  # new release. gateway-api-crds and cluster-issuers have no chart
  # dependencies, so the glob simply finds nothing to bump there.
  #
  # NOTE (ADR 0005, R17<->R22 values-sync contract): a PR bumping
  # gitops/platform/argocd's argo-cd version must be paired with a manual
  # bump of the pinned `version` in terraform/argocd.tf — Dependabot does not
  # know about that Terraform resource attribute and won't touch it.
  - package-ecosystem: "helm"
    directories:
      - "/gitops/platform/*"
      - "/gitops/workloads/*"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

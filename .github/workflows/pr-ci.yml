name: PR CI

# Required checks gating merge/auto-merge of every PR (R28):
#   - validate-charts: renders every chart under gitops/platform/* and
#     gitops/workloads/* with Helm and validates the output against upstream
#     Kubernetes schemas plus the Gateway API + cert-manager CRD schemas those
#     charts install/consume, so an invalid manifest can never reach ArgoCD.
#   - validate-terraform: runs `terraform validate` against the pinned provider
#     schemas so a provider bump that breaks the config can't auto-merge (see
#     the job comment for the -backend=false / no-credentials rationale).
#
# Runs on every PR regardless of the paths touched (no `paths:` filter) so
# the check always reports a result — a filtered trigger would leave this
# required check permanently "expected" (and merge permanently blocked) on a
# PR that doesn't touch gitops/**, e.g. a terraform-only change.
#
# `-kubernetes-version` is pinned to the OKE cluster's actual version (see
# terraform/oci-containerengine-cluster.tf `kubernetes_version`) so the
# schema check reflects what's really running, not an arbitrary default.
#
# `-skip CustomResourceDefinition` only skips validating the CRD *definition*
# objects the platform charts install (argocd/cert-manager/gateway-api-crds/
# longhorn) against a meta-schema — kubernetes-json-schema's "-standalone"
# catalogs never ship one, because CustomResourceDefinition's embedded
# OpenAPIV3Schema is self-referential and openapi2jsonschema deliberately
# excludes it (see yannh/kubeconform#100). It does NOT skip validating actual
# custom-resource *instances* (Certificate, HTTPRoute, ReferenceGrant, …)
# against the Gateway API + cert-manager schema locations below — that's the
# check this workflow exists for.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-charts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      - name: Add Helm chart repositories
        run: |
          set -euo pipefail
          # `helm dependency build` resolves a classic (non-OCI) `repository:`
          # URL against the local repo cache — it errors with "no repository
          # definition for <url>" unless that URL was registered via
          # `helm repo add` first, even though Chart.yaml already pins it
          # explicitly. OCI repositories need no such registration.
          urls="$(grep -rhoP '^\s*repository:\s*\K\S+' gitops --include=Chart.yaml | grep -E '^https?://' || true)"
          if [ -n "$urls" ]; then
            echo "$urls" | sort -u | while IFS= read -r url; do
              alias="$(echo "$url" | sed -E 's#^https?://##; s#/.*##; s/[^a-zA-Z0-9]+/-/g')"
              helm repo add "$alias" "$url"
            done
          fi

      - name: Install kubeconform (pinned, checksum-verified)
        env:
          KUBECONFORM_VERSION: "0.8.0"
          KUBECONFORM_SHA256: "9bc2bffbf71f261128533edaf912153948b7ff238f9a531ae6d34466ec287883"
        run: |
          set -euo pipefail
          archive="kubeconform-linux-amd64.tar.gz"
          curl -sSLO "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/${archive}"
          echo "${KUBECONFORM_SHA256}  ${archive}" | sha256sum -c -
          install_dir="${RUNNER_TEMP}/kubeconform"
          mkdir -p "$install_dir"
          tar -xzf "$archive" -C "$install_dir" kubeconform
          rm -f "$archive"
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Validate charts (helm dependency build + template + kubeconform)
        env:
          # Matches terraform/oci-containerengine-cluster.tf kubernetes_version.
          KUBERNETES_VERSION: "1.36.0"
          # Gateway API + cert-manager CRD schemas (and any other CRD group
          # the catalog happens to cover) for validating custom-resource
          # instances. https://github.com/datreeio/CRDs-catalog
          # Pinned to a commit SHA (not `main`) so a compromised upstream commit
          # can't silently weaken a schema and let an invalid manifest pass this
          # required check as a false PASS — same pinning discipline as the
          # SHA-pinned actions and the checksum-pinned kubeconform binary above.
          # Bump deliberately (verify against a known-good render).
          CRD_SCHEMA_LOCATION: "https://raw.githubusercontent.com/datreeio/CRDs-catalog/34cef0fc2698bbb611f475515e555a2d7ca85b6c/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json"
        run: |
          set -uo pipefail
          failed=0
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            echo "::group::${dir}"
            # kubeconform requires a .yaml/.yml/.json suffix on the path it's
            # given — an extensionless temp file is silently treated as "0
            # files" (no error, no output) rather than failing loudly.
            rendered="$(mktemp --suffix=.yaml)"
            if helm dependency build "$dir" \
              && helm template "$dir" > "$rendered" \
              && kubeconform \
                   -strict \
                   -summary \
                   -kubernetes-version "$KUBERNETES_VERSION" \
                   -skip CustomResourceDefinition \
                   -schema-location default \
                   -schema-location "$CRD_SCHEMA_LOCATION" \
                   "$rendered"
            then
              echo "OK: $dir"
            else
              echo "FAILED: $dir"
              failed=1
            fi
            rm -f "$rendered"
            echo "::endgroup::"
          done <<< "$(find gitops -mindepth 2 -maxdepth 3 -name Chart.yaml -exec dirname {} \; | sort -u)"
          exit "$failed"

  validate-terraform:
    # Gates auto-merge of terraform provider bumps (the terraform automerge
    # rule in renovate.json): `terraform validate` re-checks the config against
    # the provider schemas the bumped version ships, catching a removed/renamed
    # argument before it merges. Like validate-charts it runs on every PR (no
    # paths filter) so this required check always reports a result.
    #
    # `init -backend=false` installs the pinned providers but skips the s3
    # backend (versions.tf) -- validate needs provider schemas, not the remote
    # state, so no OCI/backend credentials are required. validate makes no API
    # calls either, so it needs no provider auth.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.15.8"
          terraform_wrapper: false

      - name: terraform init (no backend) + validate
        working-directory: terraform
        run: |
          set -euo pipefail
          # Retry init, not validate: provider downloads from
          # releases.hashicorp.com occasionally reset the connection
          # ("read: connection reset by peer"), and this is a required merge
          # gate -- a transient network blip must not block auto-merge.
          # validate is deterministic and offline, so it is not retried.
          for attempt in 1 2 3; do
            if terraform init -backend=false -input=false; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::terraform init failed after 3 attempts"
              exit 1
            fi
            echo "init attempt ${attempt} failed (likely transient) -- retrying in $((attempt * 10))s"
            sleep "$((attempt * 10))"
          done
          terraform validate -no-color

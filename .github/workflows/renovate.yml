name: Renovate

# Scheduled self-hosted Renovate runner, replacing Dependabot (see
# renovate.json at the repo root for the base config). Mints a short-lived
# GitHub App (dk-renovate-bot) installation token so Renovate's commits/PRs
# are attributed to the App — not GITHUB_TOKEN — which lets its PRs trigger
# the required checks and be auto-merged via native branch-protection
# auto-merge once that's wired up.
#
# Helm is installed in the runner per R32: the upcoming dual-stream chart
# tracking (helmv3 manager with postUpdateOptions:
# ["helmUpdateSubChartArchives"]) shells out to `helm dependency build` to
# regenerate the vendored charts/*.tgz + Chart.lock in the same PR (R24),
# mirroring the existing revendor-helm-charts.yaml workflow's use of Helm.
#
# Hardening:
#   - every `uses:` is pinned to a full commit SHA (trailing comment records
#     the version tag);
#   - permissions default to `contents: read` — Renovate authenticates against
#     GitHub with the minted App token, so the workflow's own GITHUB_TOKEN
#     never needs write access;
#   - RENOVATE_REPOSITORIES pins the run to this repo only, so the (shared)
#     App installation on the dashboard repo can't leak into this schedule.

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate a token for the dk-renovate-bot App
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      - name: Run Renovate
        uses: renovatebot/github-action@22e0a16091fc706b04affe6ae53d5e3358ac4023 # v46.1.19
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          LOG_LEVEL: debug
          LOG_FORMAT: json
          # Attribute Renovate's commits/PRs to the App bot instead of the
          # action's default "renovate-bot" identity. The email must use the
          # App bot's numeric user id (resolved via
          # `gh api users/dk-renovate-bot%5Bbot%5D`) for GitHub to recognize
          # it as a real account and render the App's avatar on the commit.
          RENOVATE_GIT_AUTHOR: "dk-renovate-bot[bot] <300303047+dk-renovate-bot[bot]@users.noreply.github.com>"
        with:
          token: ${{ steps.app-token.outputs.token }}

# cert-manager (R24): installs cert-manager and its CRDs via the upstream
# Jetstack Helm chart, with the Gateway API integration turned on so the
# controller can complete HTTP-01 challenges through an HTTPRoute and manage a
# certificate on the shared Gateway's HTTPS listener (the Gateway itself is
# built by the gateway-routing-traefik slice — a soft, name-only reference from
# the ClusterIssuer below, no hard build-time dependency between the two).
#
# GATEWAY API FEATURE-GATE — verified against the chart at build time, per the
# PRD's "Further Notes" callout ("cert-manager's Gateway API integration may
# also need its feature-gate/flag enabled — verify at build"):
#   `helm show values jetstack/cert-manager --version v1.20.3` documents
#   `ExperimentalGatewayAPISupport` as a controller feature-gate that now
#   defaults to `true` (BETA, since chart v1.20.0) — so the feature-gate alone
#   is no longer the lever. The actual switch is `config.enableGatewayAPI:
#   true`: rendering it (`helm template ... -f <these values>`) shows the
#   chart emits a `ControllerConfiguration` ConfigMap
#   (`data."config.yaml".enableGatewayAPI: true`) and adds
#   `--config=/var/cert-manager/config/config.yaml` to the controller
#   Deployment's args. That is what actually wires up the
#   `gateway.networking.k8s.io` watches the HTTP01 `gatewayHTTPRoute` solver
#   needs — set it explicitly rather than relying on the feature-gate default.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: "v1.20.3" # pinned — no floating/latest ref
    helm:
      valuesObject:
        # Install the CRDs (ClusterIssuer, Certificate, ...) as part of this
        # release. `crds.enabled` is the current key; `installCRDs: true` is
        # the deprecated top-level alias for the same thing (verified against
        # chart v1.20.3's values.yaml) — use the current one.
        crds:
          enabled: true
          # Keep CRDs (and therefore the ClusterIssuer/Certificate CRs backed
          # by them) if this Application is ever deleted/recreated — losing
          # them would cascade-delete every issued cert's Secret.
          keep: true

        # The Gateway API feature-gate/flag — see the header comment above
        # for how this was verified.
        config:
          apiVersion: controller.config.cert-manager.io/v1alpha1
          kind: ControllerConfiguration
          enableGatewayAPI: true

        # Homelab-sized requests: this cluster is the full Always Free A1
        # allowance (4 OCPU / 24 GB across 2 nodes), shared with every other
        # platform add-on and workload — cert-manager runs 3 small
        # controllers (controller, webhook, cainjector); keep each modest
        # rather than taking chart defaults.
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
        webhook:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
        cainjector:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  # R20: no repository-credential Secret — this source is the public
  # charts.jetstack.io repo (ADR 0003), pulled anonymously like everything else.
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

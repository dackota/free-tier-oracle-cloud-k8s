# Let's Encrypt ClusterIssuers (R24). HTTP-01 solved through the Gateway API
# (gatewayHTTPRoute), not the legacy Ingress solver — cert-manager creates an
# HTTPRoute attached to the shared Traefik Gateway (name traefik-gateway, ns
# traefik — the name the Traefik chart renders). NO SYNC WAVE (ADR 0005): this
# retries until the cert-manager add-on installs the ClusterIssuer CRD.
# parentRefs is a soft, name-only reference — a wrong name is a runtime no-op
# for the solver, not a render/schema failure.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # Production Let's Encrypt endpoint (R29 wants a browser-trusted cert).
    server: https://acme-v02.api.letsencrypt.org/directory
    email: {{ .Values.acmeEmail | quote }}
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: traefik-gateway
                namespace: traefik
                kind: Gateway
---
# Staging issuer, kept alongside prod so bring-up (proof-app, R27-R29) can point
# Certificates here first to dodge Let's Encrypt production rate limits while
# the HTTP-01-through-HTTPRoute path is being proven, then switch to prod.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: {{ .Values.acmeEmail | quote }}
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: traefik-gateway
                namespace: traefik
                kind: Gateway

# Gateway API standard-channel CRDs (R33): these MUST exist before the
# Traefik Application (traefik.yaml) or any Gateway/HTTPRoute, or ArgoCD's
# first sync of a dependent resource fails on an unknown kind on a fresh
# cluster (see ADR 0004 "Consequences" and the PRD's "Gateway API CRD
# ordering" note). Enforced with a low sync-wave (-1) so this Application's
# own resource tree reconciles and reports healthy before wave "0"
# (traefik.yaml, which creates the traefik GatewayClass + the shared Gateway)
# starts. This is the "plain manifest" ArgoCD Directory source pointed at
# the upstream release tag — the CRDs are vendored nowhere in this repo, so
# bumping kubernetes-sigs/gateway-api is a single targetRevision edit.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-api-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/kubernetes-sigs/gateway-api.git
    targetRevision: v1.6.0 # pinned — standard channel
    path: config/crd/standard
    directory:
      recurse: false # flat directory of one CRD/policy manifest per file
  destination:
    server: https://kubernetes.default.svc
    # CRDs are cluster-scoped, so this namespace is a no-op for the actual
    # applied resources; set to argocd for consistency with the other
    # platform-management Applications in this directory.
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Required here, not just conventional: several Gateway API CRDs
      # (Gateway, HTTPRoute) carry OpenAPI schemas large enough that
      # client-side apply's kubectl.kubernetes.io/last-applied-configuration
      # annotation can exceed the Kubernetes annotation size limit.
      # Server-side apply has no such annotation and is the documented
      # workaround upstream.
      - ServerSideApply=true

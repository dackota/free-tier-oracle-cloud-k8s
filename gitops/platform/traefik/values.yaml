# Traefik (R23, ADR 0004), values under the `traefik:` subchart key. One chart
# does three jobs via native upstream values: the proxy Deployment + its
# data-plane LoadBalancer Service (the single Always Free OCI LB), the `traefik`
# GatewayClass, and the shared `Gateway` with HTTP :80 (chart default) + HTTPS
# :443 listeners.
traefik:
  # Gateway API implementation (R23): enable the kubernetesGateway provider so
  # Traefik watches Gateway/HTTPRoute and owns the GatewayClass + Gateway below
  # (gatewayClass.enabled / gateway.enabled are chart defaults; restated for
  # visibility since they're load-bearing for R23).
  providers:
    kubernetesGateway:
      enabled: true
  gatewayClass:
    enabled: true
  gateway:
    enabled: true
    listeners:
      # HTTP :80 stays a chart default (cert-manager's HTTP-01 challenge solves
      # through an HTTPRoute on it). HTTPS :443 added here for R23;
      # certificateRefs names the Secret(s) cert-manager populates, decoupling
      # routing from the cert-manager rollout. Each public workload owns its own
      # host cert Secret and adds it here; Traefik selects the right one per SNI,
      # so apps don't fight over a single shared Secret:
      #   - proof-app-tls (ns proof-app)        -> proof.<baseDomain>   (proof-app, migrated to
      #                                            generic-app-chart — R32 — so its Certificate now
      #                                            renders in its own namespace; cross-namespace per
      #                                            ADR 0001, hence the explicit `namespace` below)
      #   - change-tracking-dashboard-tls (ns change-tracking-dashboard) -> changes.<baseDomain>
      #                                            (change-tracking-dashboard, migrated to
      #                                            generic-app-chart — ctd-migrate-retire — so its
      #                                            Certificate now renders in its own namespace too;
      #                                            cross-namespace per ADR 0001, hence the explicit
      #                                            `namespace` below)
      #
      # NOTE: the old `traefik-gateway-tls` Secret (this `traefik` namespace)
      # is now orphaned by the R32 migration above — cert-manager does not
      # garbage-collect a Secret when its owning Certificate is deleted, by
      # default. Safe for the operator to manually delete once the proof-app
      # migration is confirmed live.
      #
      # namespacePolicy renders directly into this listener's Gateway API
      # allowedRoutes.namespaces (see the upstream chart's templates/gateway.yaml).
      # Unset, it defaults to Gateway API's own default (Same) — only Routes in
      # this Gateway's own namespace (traefik) could attach. Both workloads on
      # this lab (proof-app, R32; change-tracking-dashboard, ctd-migrate-retire)
      # have now moved to the app-owned model below, with their own
      # HTTPRoute/Certificate in each workload's own namespace instead of
      # traefik's.
      #
      # `Selector` (not the broader `All`) opts in only namespaces carrying the
      # `gateway-access: "true"` label — every workload namespace gets it
      # automatically via the `workloads` ApplicationSet's
      # managedNamespaceMetadata (applicationsets/workloads.yaml), and this
      # Gateway's own `traefik` namespace still carries it too via the
      # `platform` ApplicationSet (gitops/platform/traefik/config.yaml's
      # gatewayAccess flag) — left as configured, unaddressed by this
      # migration, even though no workload now needs a same-namespace Route
      # there. No other platform namespace (argocd, cert-manager,
      # longhorn-system, ...) is labeled, so this stays scoped to exactly the
      # namespaces that need internet-facing routing, not every namespace in
      # the cluster (`All`).
      # This is the platform-side prerequisite for
      # personal-generic-app-chart's app-owned-routing model — each workload
      # owns its own HTTPRoute/Certificate in its own namespace instead of
      # writing into traefik's (see that repo's
      # docs/adr/0001-gateway-cross-namespace-routing.md). proof-app (R32) and
      # change-tracking-dashboard (ctd-migrate-retire) are both on this model now.
      web:
        namespacePolicy:
          from: Selector
          selector:
            matchLabels:
              gateway-access: "true"
      websecure:
        port: 8443
        protocol: HTTPS
        mode: Terminate
        namespacePolicy:
          from: Selector
          selector:
            matchLabels:
              gateway-access: "true"
        certificateRefs:
          - kind: Secret
            name: proof-app-tls
            namespace: proof-app
          - kind: Secret
            name: change-tracking-dashboard-tls
            namespace: change-tracking-dashboard
          # job-intel Dagit UI (jobs.<baseDomain>). Cert renders in the
          # job-intel namespace; a ReferenceGrant there permits this
          # cross-namespace ref (gitops/workloads/job-intel/templates/referencegrant.yaml).
          - kind: Secret
            name: job-intel-tls
            namespace: job-intel
  # Data-plane Service stays LoadBalancer (chart default) — provisions the
  # single Always Free OCI LB. Pinned to the flexible shape at the free-tier
  # 10 Mbps cap (a fixed shape is billable; a second LB of any shape exceeds
  # the one-LB allowance).
  service:
    annotations:
      service.beta.kubernetes.io/oci-load-balancer-shape: "flexible"
      service.beta.kubernetes.io/oci-load-balancer-shape-flex-min: "10"
      service.beta.kubernetes.io/oci-load-balancer-shape-flex-max: "10"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi

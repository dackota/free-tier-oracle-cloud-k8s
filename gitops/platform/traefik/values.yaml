# Traefik (R23, ADR 0004), values under the `traefik:` subchart key. One chart
# does three jobs via native upstream values: the proxy Deployment + its
# data-plane LoadBalancer Service (the single Always Free OCI LB), the `traefik`
# GatewayClass, and the shared `Gateway` with HTTP :80 (chart default) + HTTPS
# :443 listeners.
traefik:
  # Gateway API implementation (R23): enable the kubernetesGateway provider so
  # Traefik watches Gateway/HTTPRoute and owns the GatewayClass + Gateway below
  # (gatewayClass.enabled / gateway.enabled are chart defaults; restated for
  # visibility since they're load-bearing for R23).
  providers:
    kubernetesGateway:
      enabled: true
  gatewayClass:
    enabled: true
  gateway:
    enabled: true
    listeners:
      # HTTP :80 stays a chart default (cert-manager's HTTP-01 challenge solves
      # through an HTTPRoute on it). HTTPS :443 added here for R23;
      # certificateRefs names the Secret(s) cert-manager populates, decoupling
      # routing from the cert-manager rollout. Each public workload owns its own
      # host cert Secret and adds it here; Traefik selects the right one per SNI,
      # so apps don't fight over a single shared Secret:
      #   - traefik-gateway-tls            -> proof.<baseDomain>            (proof-app)
      #   - change-tracking-dashboard-tls  -> changes.<baseDomain>          (change-tracking-dashboard)
      #
      # namespacePolicy renders directly into this listener's Gateway API
      # allowedRoutes.namespaces (see the upstream chart's templates/gateway.yaml).
      # Unset, it defaults to Gateway API's own default (Same) — only Routes in
      # this Gateway's own namespace (traefik) could attach, which is why
      # proof-app and change-tracking-dashboard currently place their
      # HTTPRoute/Certificate here in traefik rather than their own namespace.
      #
      # `Selector` (not the broader `All`) opts in only namespaces carrying the
      # `gateway-access: "true"` label — every workload namespace gets it
      # automatically via the `workloads` ApplicationSet's
      # managedNamespaceMetadata (applicationsets/workloads.yaml), and this
      # Gateway's own `traefik` namespace gets it via the `platform`
      # ApplicationSet (applicationsets/platform.yaml) so the two EXISTING
      # same-namespace Routes (proof-app, change-tracking-dashboard) keep
      # attaching — `Selector` replaces the `Same` default outright, it does
      # not implicitly also allow the Gateway's own namespace. No other
      # platform namespace (argocd, cert-manager, longhorn-system, ...) is
      # labeled, so this stays scoped to exactly the namespaces that need
      # internet-facing routing, not every namespace in the cluster (`All`).
      # This is the platform-side prerequisite for
      # personal-generic-app-chart's app-owned-routing model — each workload
      # owns its own HTTPRoute/Certificate in its own namespace instead of
      # writing into traefik's (see that repo's
      # docs/adr/0001-gateway-cross-namespace-routing.md).
      web:
        namespacePolicy:
          from: Selector
          selector:
            matchLabels:
              gateway-access: "true"
      websecure:
        port: 8443
        protocol: HTTPS
        mode: Terminate
        namespacePolicy:
          from: Selector
          selector:
            matchLabels:
              gateway-access: "true"
        certificateRefs:
          - kind: Secret
            name: traefik-gateway-tls
          - kind: Secret
            name: change-tracking-dashboard-tls
  # Data-plane Service stays LoadBalancer (chart default) — provisions the
  # single Always Free OCI LB. Pinned to the flexible shape at the free-tier
  # 10 Mbps cap (a fixed shape is billable; a second LB of any shape exceeds
  # the one-LB allowance).
  service:
    annotations:
      service.beta.kubernetes.io/oci-load-balancer-shape: "flexible"
      service.beta.kubernetes.io/oci-load-balancer-shape-flex-min: "10"
      service.beta.kubernetes.io/oci-load-balancer-shape-flex-max: "10"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi

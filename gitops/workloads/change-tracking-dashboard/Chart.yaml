apiVersion: v2
name: change-tracking-dashboard
description: >-
  change-tracking-dashboard (ctd-migrate-retire) — polls this GitOps repo's
  history and surfaces tracked Helm chart/subchart/image version changes as a
  faceted, time-ordered feed, consumed as a thin OCI dependency on the
  published generic-app-chart. Proves the chart's full app-owned
  routing/TLS model end-to-end against a real stateful workload: Deployment,
  Service, ConfigMap, PersistentVolumeClaim (a chart-owned Longhorn claim),
  HTTPRoute, and cert-manager Certificate all rendered by
  the chart from this app's own values, reachable over HTTPS through the
  shared Gateway.
type: application
version: 0.1.0
dependencies:
  - name: generic-app-chart
    version: 0.4.0
    repository: oci://ghcr.io/dackota/charts

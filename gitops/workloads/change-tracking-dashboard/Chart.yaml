apiVersion: v2
name: change-tracking-dashboard
description: >
  change-tracking-dashboard workload — polls this GitOps repo's history and
  surfaces tracked Helm chart/subchart/image version changes as a faceted,
  time-ordered feed. Wraps the app's published chart (vendored from ghcr as an
  OCI dependency) plus local templates for the shared Gateway route and its cert.
type: application
version: 0.1.0
dependencies:
  # Published by the app repo's Release workflow to ghcr as an OCI chart.
  # `helm dependency build` vendors it into charts/*.tgz (the re-vendor workflow
  # keeps it fresh on version bumps). Requires the ghcr chart package to be
  # public (anonymous pull) — see the app repo's post-merge steps.
  - name: change-tracking-dashboard
    version: 0.1.1
    repository: oci://ghcr.io/dackota/charts

# HTTPRoute carrying dashboard traffic. Lives in the `traefik` namespace (NOT
# change-tracking-dashboard) because the shared Gateway (gitops/platform/traefik)
# sets no `allowedRoutes` on its listeners, so Gateway API defaults every listener
# to `allowedRoutes.namespaces.from: Same` — a route in this workload's namespace
# would never attach. Its backendRef then crosses back into the
# change-tracking-dashboard namespace (where the Service lives), which is why
# templates/reference-grant.yaml exists alongside this file.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: change-tracking-dashboard
  namespace: traefik
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: websecure
  hostnames:
    - {{ include "ctd.host" . }}
  rules:
    - backendRefs:
        # The dashboard Service, rendered by the vendored subchart with
        # releaseName `change-tracking-dashboard` (chart name == release name,
        # so fullname collapses to `change-tracking-dashboard`, port 8080) —
        # confirmed by rendering this chart, not guessed.
        - name: change-tracking-dashboard
          namespace: change-tracking-dashboard
          port: 8080

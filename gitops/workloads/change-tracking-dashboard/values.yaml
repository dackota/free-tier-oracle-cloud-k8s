# change-tracking-dashboard (ctd-migrate-retire): the second workload (after
# proof-app, R32) migrated onto generic-app-chart's full app-owned
# routing/TLS model end-to-end — git -> ArgoCD -> Gateway -> live HTTPS. This
# is a live, stateful production app (real PVC, real SQLite change-history
# data, real HTTPS traffic at changes.dackota.com); every value below
# replicates the vendored bespoke chart's live behavior exactly. Values nest
# under the `generic-app-chart:` dependency key (Helm's standard
# subchart-values convention).
generic-app-chart:
  # Keeps every rendered resource named "change-tracking-dashboard" instead
  # of the chart's default "change-tracking-dashboard-generic-app-chart"
  # (R2: <release>-<chart>) — matches the resource names the bespoke chart
  # already rendered live.
  fullnameOverride: change-tracking-dashboard

  # CRITICAL, load-bearing: without this, generic-app-chart.selectorLabels
  # renders `app.kubernetes.io/name: generic-app-chart` (the chart's own
  # name), but the live Deployment created by the bespoke chart already has
  # an immutable spec.selector of `app.kubernetes.io/name:
  # change-tracking-dashboard`. Kubernetes rejects any Deployment update
  # that changes spec.selector, so ArgoCD gets stuck retrying forever, and
  # the Service (whose selector *does* update, since Service selectors are
  # mutable) ends up with zero matching endpoints — a live outage,
  # discovered the hard way during this migration's rollout. nameOverride
  # keeps the selector identical to the pre-existing one so the update
  # applies as a normal in-place patch instead. Any future live-app
  # migration onto this chart (not a fresh deployment) must set this to the
  # previous chart's name.
  nameOverride: change-tracking-dashboard

  image:
    repository: ghcr.io/dackota/change-tracking-dashboard
    # renovate: datasource=docker depName=ghcr.io/dackota/change-tracking-dashboard
    tag: "0.10.4"

  # The app process runs as uid/gid 65534 ("nobody"), as the bespoke chart
  # hardcoded; generic-app-chart's own default is 10001. Setting these (with
  # fsGroup 65534) makes the kubelet chown the freshly provisioned Longhorn
  # volume to the app's uid/gid so it can read/write /data (see persistence
  # below).
  podSecurityContext:
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534

  # The 3 env vars the bespoke chart hardcoded (not configurable there
  # either) — reproduced verbatim.
  env:
    - name: CONFIG_PATH
      value: /etc/dashboard/config.yaml
    - name: DB_PATH
      value: /data/changes.db
    - name: LISTEN_ADDR
      value: ":8080"

  service:
    ports:
      - name: http
        port: 8080
        targetPort: 8080
        protocol: TCP

  # Matches the live Deployment's actual probes exactly.
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 15
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10

  # Existing production override (already live today) — the bespoke chart's
  # own chart-level default was 50m/64Mi; the gitops values already
  # overrode requests to 25m. Preserved as-is, not reverted to any default.
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  # The chart owns this PVC: generic-app-chart renders a PersistentVolumeClaim
  # named after the chart fullname (change-tracking-dashboard; 1Gi, Longhorn,
  # RWO) and mounts it at /data. Because the PVC is now part of the rendered
  # source, ArgoCD reconciles it in place and the Application stays InSync —
  # no more out-of-source PVC, and no git-invisible
  # argocd.argoproj.io/sync-options: Prune=false annotation to maintain by
  # hand (the pre-existingClaim design that left this app permanently
  # OutOfSync).
  #
  # The dashboard's SQLite change-history DB (/data/changes.db) is fully
  # regenerable: on startup the poller re-clones this repo (into ephemeral
  # storage, not /data) and backfills up to backfillDays of history (see
  # config.yaml), so a fresh empty volume rebuilds the entire feed. That makes
  # the volume disposable — migrating off the old change-tracking-dashboard-data
  # PVC (deleting it and letting the chart provision this one) costs only a
  # brief re-backfill, not real data loss.
  persistence:
    enabled: true
    size: 1Gi
    storageClass: longhorn
    mountPath: /data

  # Tracker config (hot-reloaded), moved verbatim from the bespoke chart's
  # ConfigMap into this chart's generic `config` value. Rendered into a
  # ConfigMap named after this chart's fullname (no suffix) — mounted below
  # via extraVolumes/extraVolumeMounts since generic-app-chart's `config`
  # only renders the ConfigMap, it doesn't auto-mount it.
  config:
    config.yaml: |
      defaults:
        pollIntervalSeconds: 600
        backfillDays: 90
      trackers:
        - repo: https://github.com/dackota/free-tier-oracle-cloud-k8s.git
          facetRegex: "gitops/(?P<layer>platform|workloads)/(?P<component>[^/]+)/"
          files:
            - glob: "gitops/*/*/Chart.yaml"
              fields:
                - name: chartDependencies
                  # `// []` guards charts with no dependencies: block (e.g.
                  # cluster-issuers, gateway-api-crds) — map over null errors.
                  expr: '(.dependencies // []) | map({(if .alias then .alias else .name end): .version}) | add'
            - glob: "gitops/*/*/values.yaml"
              fields:
                - name: imageTags
                  # Type-guard each entry so top-level scalar values (e.g. an
                  # `email:`/`domain:` string) are skipped instead of erroring
                  # on `.value.image` — jq `and` short-circuits before indexing.
                  expr: 'to_entries | map(select((.value | type) == "object" and (.value.image | type) == "object" and .value.image.tag != null)) | map({(.key): .value.image.tag}) | add'
            # Terraform/OCI infra. This tracker's `engine` is unset, so the
            # poller auto-detects the extractor per-glob from the file suffix
            # (extractor.InferEngine): the `.tf` glob selects the `hcl` engine
            # while the Chart.yaml/values.yaml globs above stay on jq. HCL
            # `expr`s are structural traversal paths (block type + labels ->
            # attribute), NOT jq. Each field resolves to a single scalar; a
            # path that doesn't exist in a given .tf file is recorded as absent
            # (no spurious change), so one glob + all fields is safe even
            # though each field lives in only one file. Verified against the
            # live files with the hclextract engine before committing.
            #
            # Field NAMES are deliberately kebab-case (not this repo's usual
            # camelCase): the dashboard's compiled-in risk classifier
            # (changeset.DefaultRiskRules) matches word-boundaried regexes
            # against the field name — e.g. `\bocpus?\b`, `\bsize\b`,
            # `boot[_-]?volume`, `node[_-]?shape\b` — so `node-pool-ocpus`
            # trips the "cost tripwire" badge while a camelCase `nodeOcpus`
            # (no internal word boundary) would NOT. Names echo the underlying
            # HCL attribute, matching the classifier's shipped OCI conventions.
            - glob: "terraform/*.tf"
              fields:
                # Provider + Terraform version pins (versions.tf) — the surface
                # renovate bumps (e.g. PR #46, oci -> v8). No risk badge (a
                # provider bump isn't a cost/security/replace signal).
                - name: terraform-required-version
                  expr: "terraform.required_version"
                - name: oci-provider-version
                  expr: "terraform.required_providers.oci.version"
                - name: helm-provider-version
                  expr: "terraform.required_providers.helm.version"
                - name: kubectl-provider-version
                  expr: "terraform.required_providers.kubectl.version"
                # OKE control-plane Kubernetes version (oci-containerengine-cluster.tf)
                # — pinned literal; upgrades are deliberate, reviewed changes
                # (e.g. the v1.36.1 bump), exactly the kind of change to surface.
                - name: kubernetes-version
                  expr: "resource.oci_containerengine_cluster.main.kubernetes_version"
                # Always-Free node-pool cost tripwires (oci-containerengine-nodepool.tf):
                # node count, shape, per-node OCPU/memory, and boot volume size.
                # Any change here risks breaching the free-tier allowance, so
                # they are the highest-signal infra fields to watch. node-shape
                # trips the "replace/destroy" risk badge (a shape change forces
                # node replacement); the rest trip "cost tripwire".
                - name: node-pool-size
                  expr: "resource.oci_containerengine_node_pool.main.node_config_details.size"
                - name: node-shape
                  expr: "resource.oci_containerengine_node_pool.main.node_shape"
                - name: node-pool-ocpus
                  expr: "resource.oci_containerengine_node_pool.main.node_shape_config.ocpus"
                - name: node-pool-memory-in-gbs
                  expr: "resource.oci_containerengine_node_pool.main.node_shape_config.memory_in_gbs"
                - name: node-pool-boot-volume-size
                  expr: "resource.oci_containerengine_node_pool.main.node_source_details.boot_volume_size_in_gbs"

  extraVolumes:
    - name: config
      configMap:
        name: change-tracking-dashboard
  extraVolumeMounts:
    - name: config
      mountPath: /etc/dashboard
      readOnly: true

  # R21-R23: expose over HTTPS through the lab's one shared Traefik Gateway,
  # in this app's own namespace (ADR 0001 app-owned routing/TLS model). The
  # live, already-working hostname — unchanged by this migration.
  routing:
    enabled: true
    hostnames:
      - changes.dackota.com
    gateway:
      name: traefik-gateway
      namespace: traefik
      sectionName: websecure
    tls:
      issuerRef:
        name: letsencrypt-prod

# HTTPRoute (R28) carrying podinfo traffic. Lives in the `traefik` namespace
# (NOT proof-app) because the shared Gateway (gitops/platform/traefik) sets
# no `allowedRoutes` on its listeners, so Gateway API defaults every listener
# to `allowedRoutes.namespaces.from: Same` -- a route in proof-app would
# never attach. Its backendRef then crosses back into proof-app (where the
# podinfo Service actually lives), which is why templates/reference-grant.yaml
# exists alongside this file.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: proof-app
  namespace: traefik
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: websecure
  hostnames:
    - {{ include "proof-app.host" . }}
  rules:
    - backendRefs:
        # The podinfo Service, rendered by the vendored subchart with
        # releaseName `proof-app` and chart name `podinfo`
        # (`proof-app-podinfo`, port `http`/9898) -- confirmed by rendering
        # this chart, not guessed.
        - name: proof-app-podinfo
          namespace: proof-app
          port: 9898

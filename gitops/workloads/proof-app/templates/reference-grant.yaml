# ReferenceGrant authorizing the cross-namespace backendRef in
# templates/httproute.yaml: an HTTPRoute in `traefik` pointing at the
# podinfo Service in `proof-app`. Gateway API refuses cross-namespace
# references without an explicit grant from the TARGET namespace, so this
# lives here in proof-app (not traefik) naming the traefik-ns HTTPRoute as
# the sole authorized referrer. Scoped to least privilege on BOTH axes: the
# `from` names the one HTTPRoute source ns/kind, and the `to` names the one
# Service (`proof-app-podinfo`) -- not every Service in proof-app -- so a
# future route in traefik cannot use this grant to reach any other Service.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: traefik-httproute-to-podinfo
  namespace: proof-app
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: traefik
  to:
    - group: ""
      kind: Service
      name: proof-app-podinfo

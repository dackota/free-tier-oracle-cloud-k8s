# proof-app (R32): the v1 proof workload validating generic-app-chart's full
# app-owned routing/TLS model end-to-end — git -> ArgoCD -> Gateway -> live
# HTTPS. Values nest under the `generic-app-chart:` dependency key (Helm's
# standard subchart-values convention).
generic-app-chart:
  # Keeps every rendered resource named "proof-app" instead of the chart's
  # default "proof-app-generic-app-chart" (R2: <release>-<chart>, since
  # "proof-app" doesn't already contain "generic-app-chart").
  fullnameOverride: proof-app

  image:
    repository: ghcr.io/stefanprodan/podinfo
    tag: 6.14.0

  # Free-tier-sized requests only, matching the repo-wide pattern (see
  # traefik/metrics-server values) on a capacity-constrained homelab node;
  # limits stay at the chart's own default.
  resources:
    requests:
      cpu: 10m
      memory: 32Mi

  service:
    ports:
      - name: http
        port: 9898
        targetPort: 9898
        protocol: TCP

  livenessProbe:
    httpGet:
      path: /healthz
      port: http
  readinessProbe:
    httpGet:
      path: /readyz
      port: http

  # R21-R23: expose over HTTPS through the lab's one shared Traefik Gateway,
  # in this app's own namespace (ADR 0001 app-owned routing/TLS model).
  routing:
    enabled: true
    hostnames:
      - proof.dackota.com
    gateway:
      name: traefik-gateway
      namespace: traefik
      sectionName: websecure
    tls:
      issuerRef:
        name: letsencrypt-prod
